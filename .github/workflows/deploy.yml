name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-container:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/becket77/file-processor
          tags: |
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./processor
          push: true
          tags: ${{ steps.meta.outputs.tags }}

  deploy-worker:
    runs-on: ubuntu-latest
    needs: build-container
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        working-directory: worker
        run: npm install

      - name: Update image tag in wrangler.toml
        working-directory: worker
        run: |
          IMAGE="ghcr.io/becket77/file-processor:sha-$(git rev-parse --short HEAD)"
          sed -i "s|image = .*|image = \"$IMAGE\"|" wrangler.toml
          echo "Using image: $IMAGE"
          grep image wrangler.toml

      - name: Set Worker secrets
        working-directory: worker
        run: |
          echo "${{ secrets.R2_ENDPOINT }}"       | npx wrangler secret put R2_ENDPOINT
          echo "${{ secrets.R2_ACCESS_KEY }}"     | npx wrangler secret put R2_ACCESS_KEY
          echo "${{ secrets.R2_SECRET_KEY }}"     | npx wrangler secret put R2_SECRET_KEY
          echo "${{ secrets.R2_BUCKET }}"         | npx wrangler secret put R2_BUCKET
          echo "${{ secrets.TOKEN_SERVICE_URL }}" | npx wrangler secret put TOKEN_SERVICE_URL
          echo "${{ secrets.EXTERNAL_API_URL }}"  | npx wrangler secret put EXTERNAL_API_URL
          echo "${{ secrets.SMTP_HOST }}"         | npx wrangler secret put SMTP_HOST
          echo "${{ secrets.SMTP_PORT }}"         | npx wrangler secret put SMTP_PORT
          echo "${{ secrets.SMTP_USER }}"         | npx wrangler secret put SMTP_USER
          echo "${{ secrets.SMTP_PASS }}"         | npx wrangler secret put SMTP_PASS
          echo "${{ secrets.SMTP_FROM }}"         | npx wrangler secret put SMTP_FROM
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Configure ghcr.io registry
        working-directory: worker
        run: |
          printf '%s' '${{ secrets.GITHUB_TOKEN }}' | \
          npx wrangler containers registries configure ghcr.io \
            --username=becket77 \
            --secret-name=ghcr-token \
            --skip-confirmation
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Deploy Worker
        working-directory: worker
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: deploy-worker
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build
        env:
          VITE_API_URL: https://file-processor.${{ secrets.CF_ACCOUNT_ID }}.workers.dev

      - name: Deploy to Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: pages deploy dist --project-name=file-processor
          workingDirectory: frontend